version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: relayguard_postgres_prod
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - postgres_production_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 3s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: always

  redis:
    image: redis:7-alpine
    container_name: relayguard_redis_prod
    volumes:
      - redis_production_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping"]
      interval: 3s
      timeout: 3s
      retries: 5
    restart: always

  backend:
    build:
      context: .
      dockerfile: app/Dockerfile
    container_name: relayguard_backend_prod
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    environment:
      - SERVICE_URL_BACKEND_8000
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - MOCK_VENDOR_URL=http://mock_vendor:8001/mock/send
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always

  worker:
    build:
      context: .
      dockerfile: app/Dockerfile
    container_name: relayguard_worker_prod
    command: arq app.worker.WorkerSettings
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - MOCK_VENDOR_URL=http://mock_vendor:8001/mock/send
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mock_vendor:
        condition: service_started
    restart: always

  mock_vendor:
    build:
      context: ./mock_vendor
      dockerfile: Dockerfile
    container_name: relayguard_vendor_prod
    environment:
      - SERVICE_URL_MOCK_VENDOR_8001
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL}
        - VITE_VENDOR_URL=${VITE_VENDOR_URL}
    container_name: relayguard_frontend_prod
    environment:
      - SERVICE_URL_FRONTEND_80
    depends_on:
      - backend
    restart: always

volumes:
  postgres_production_data:
  redis_production_data: